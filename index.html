<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Pledge 🏆</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #f0f4f8;
      --card: #ffffff;
      --accent: #4f46e5;
      --accent2: #10b981;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: white;
      padding: 28px 20px 24px;
      text-align: center;
    }
    header h1 { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.5px; }
    header p  { margin-top: 6px; font-size: 0.9rem; opacity: 0.85; }

    .container { max-width: 900px; margin: 0 auto; padding: 20px 16px 40px; }

    /* Leaderboard cards */
    .leaderboard {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .leader-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px 12px;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      border-top: 4px solid var(--accent);
      position: relative;
    }
    .leader-card.top1 { border-top-color: #f59e0b; }
    .leader-card.top2 { border-top-color: #94a3b8; }
    .leader-card.top3 { border-top-color: #b45309; }
    .leader-card .rank { font-size: 1.2rem; }
    .leader-card .name { font-weight: 700; font-size: 0.95rem; margin: 4px 0 2px; }
    .leader-card .pct  { font-size: 1.3rem; font-weight: 800; color: var(--accent2); }
    .leader-card .lbl  { font-size: 0.72rem; color: var(--muted); }

    /* Section titles */
    .section-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Chart cards */
    .chart-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      margin-bottom: 20px;
    }
    .chart-card canvas { max-height: 320px; }

    /* Table */
    .table-wrap {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      overflow: hidden;
      margin-bottom: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    thead th {
      background: var(--accent);
      color: white;
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
      white-space: nowrap;
    }
    tbody tr:nth-child(even) { background: #f8fafc; }
    tbody td {
      padding: 9px 12px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody tr:last-child td { border-bottom: none; }
    .positive { color: var(--accent2); font-weight: 700; }
    .zero     { color: var(--muted); }

    /* Legend fix */
    .chart-card .legend {
      display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.78rem; color: var(--muted);
    }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    footer {
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      padding: 10px 0 24px;
    }

    /* Mobile table scroll */
    .table-wrap { overflow-x: auto; }

    @media (max-width: 480px) {
      header h1 { font-size: 1.35rem; }
      .leaderboard { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .leader-card { padding: 10px 8px; }
      .leader-card .pct { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

<!-- ============================================================
     DATA SECTION — edit this to update the page
     - weeks:  array of date labels (strings)
     - members: each person's name, startWeight, and weights[]
                (one entry per week, use null if not weighed in)
     ============================================================ -->
<script>
const DATA = {
  title: "The Pledge 🏆",
  subtitle: "Phase 2",
  unit: "kgs",   // change to "kg" if needed

  weeks: [
    "Apr 10", "Apr 17", "Apr 24", "May 1",
    "May 8", "May 15", "May 22"
  ],

  members: [
    { name: "Nick",    startWeight: 105.2, weights: [105.2, 104.7, null, null, null, null, null] },
    { name: "Jack",  startWeight: 88.7, weights: [88.7, null, 89.2, null, null, null, null] },
    { name: "Phil",  startWeight: 74.4, weights: [88.7, null, null, null, null, null, null] },
    { name: "Steve",  startWeight: 80.5, weights: [80.5, null, null, null, null, null, null] },
  ]
};
</script>
<!-- ============================================================
     END DATA SECTION
     ============================================================ -->

<header>
  <h1 id="page-title"></h1>
  <p id="page-subtitle"></p>
</header>

<div class="container">

  <!-- Leaderboard -->
  <div class="section-title">🏅 Leaderboard — % Lost</div>
  <div class="leaderboard" id="leaderboard"></div>

  <!-- Chart 1: Weight over time -->
  <div class="chart-card">
    <div class="section-title">📉 Weight Over Time</div>
    <canvas id="weightChart"></canvas>
  </div>

  <!-- Chart 2: % lost over time -->
  <div class="chart-card">
    <div class="section-title">🔥 % Body Weight Lost</div>
    <canvas id="pctChart"></canvas>
  </div>

  <!-- Table -->
  <div class="section-title">📋 Full Data Table</div>
  <div class="table-wrap">
    <table id="dataTable"></table>
  </div>

  <footer id="footer"></footer>
</div>

<script>
// ── Palette ──────────────────────────────────────────────────────────────
const COLORS = [
  "#4f46e5","#10b981","#f59e0b","#ef4444","#3b82f6","#8b5cf6","#ec4899",
  "#14b8a6","#f97316","#84cc16"
];

// ── Helpers ──────────────────────────────────────────────────────────────
function latestWeight(m) {
  for (let i = m.weights.length - 1; i >= 0; i--) {
    if (m.weights[i] !== null) return m.weights[i];
  }
  return m.startWeight;
}
function pctLost(m) {
  return ((m.startWeight - latestWeight(m)) / m.startWeight * 100);
}
function weightLost(m) {
  return m.startWeight - latestWeight(m);
}

// ── Page title ──────────────────────────────────────────────────────────
document.getElementById("page-title").textContent  = DATA.title;
document.getElementById("page-subtitle").textContent = DATA.subtitle;

// ── Leaderboard ──────────────────────────────────────────────────────────
const ranked = [...DATA.members].sort((a,b) => pctLost(b) - pctLost(a));
const lb = document.getElementById("leaderboard");
const medals = ["🥇","🥈","🥉"];
ranked.forEach((m, i) => {
  const cls = i < 3 ? `top${i+1}` : "";
  lb.innerHTML += `
    <div class="leader-card ${cls}">
      <div class="rank">${medals[i] || `#${i+1}`}</div>
      <div class="name">${m.name}</div>
      <div class="pct">${pctLost(m).toFixed(1)}%</div>
      <div class="lbl">lost ${weightLost(m).toFixed(1)} ${DATA.unit}</div>
    </div>`;
});

// ── Chart defaults ───────────────────────────────────────────────────────
Chart.defaults.font.family = "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif";
Chart.defaults.font.size   = 12;
const gridColor = "rgba(0,0,0,0.06)";
const tickColor = "#64748b";

function baseChartOptions(yLabel) {
  return {
    responsive: true,
    interaction: { mode: "index", intersect: false },
    plugins: {
      legend: {
        position: "bottom",
        labels: { boxWidth: 10, padding: 12, color: tickColor }
      },
      tooltip: { padding: 10 }
    },
    scales: {
      x: {
        grid: { color: gridColor },
        ticks: { color: tickColor }
      },
      y: {
        grid: { color: gridColor },
        ticks: { color: tickColor },
        title: { display: true, text: yLabel, color: tickColor }
      }
    }
  };
}

// ── Chart 1: Weight over time ────────────────────────────────────────────
const weightDatasets = DATA.members.map((m, i) => ({
  label: m.name,
  data: m.weights,
  borderColor: COLORS[i % COLORS.length],
  backgroundColor: COLORS[i % COLORS.length] + "22",
  borderWidth: 2.5,
  pointRadius: 4,
  pointHoverRadius: 6,
  tension: 0.3,
  spanGaps: true
}));

new Chart(document.getElementById("weightChart"), {
  type: "line",
  data: { labels: DATA.weeks, datasets: weightDatasets },
  options: baseChartOptions(`Weight (${DATA.unit})`)
});

// ── Chart 2: % lost over time ────────────────────────────────────────────
const pctDatasets = DATA.members.map((m, i) => ({
  label: m.name,
  data: m.weights.map(w => w === null ? null : parseFloat(((m.startWeight - w) / m.startWeight * 100).toFixed(2))),
  borderColor: COLORS[i % COLORS.length],
  backgroundColor: COLORS[i % COLORS.length] + "22",
  borderWidth: 2.5,
  pointRadius: 4,
  pointHoverRadius: 6,
  tension: 0.3,
  spanGaps: true
}));

new Chart(document.getElementById("pctChart"), {
  type: "line",
  data: { labels: DATA.weeks, datasets: pctDatasets },
  options: {
    ...baseChartOptions("% Lost"),
    plugins: {
      ...baseChartOptions("% Lost").plugins,
      tooltip: {
        padding: 10,
        callbacks: {
          label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y?.toFixed(2) ?? "–"}%`
        }
      }
    },
    scales: {
      ...baseChartOptions("% Lost").scales,
      y: {
        ...baseChartOptions("% Lost").scales.y,
        ticks: {
          color: tickColor,
          callback: v => v + "%"
        }
      }
    }
  }
});

// ── Table ─────────────────────────────────────────────────────────────────
const table = document.getElementById("dataTable");
const membersByName = [...DATA.members].sort((a,b) => a.name.localeCompare(b.name));

// Header
let head = "<thead><tr><th>Name</th><th>Start</th>";
DATA.weeks.forEach(w => head += `<th>${w}</th>`);
head += `<th>Total Lost</th><th>% Lost</th></tr></thead>`;

// Body
let body = "<tbody>";
membersByName.forEach((m, i) => {
  const color = COLORS[DATA.members.indexOf(m) % COLORS.length];
  body += `<tr>
    <td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${color};margin-right:6px;"></span><strong>${m.name}</strong></td>
    <td>${m.startWeight} ${DATA.unit}</td>`;
  m.weights.forEach(w => {
    body += `<td>${w !== null ? w + " " + DATA.unit : "–"}</td>`;
  });
  const lost = weightLost(m);
  const pct  = pctLost(m);
  const cls  = lost > 0 ? "positive" : "zero";
  body += `
    <td class="${cls}">${lost > 0 ? "−" : ""}${Math.abs(lost).toFixed(1)} ${DATA.unit}</td>
    <td class="${cls}">${pct > 0 ? "−" : ""}${Math.abs(pct).toFixed(1)}%</td>
  </tr>`;
});
body += "</tbody>";

table.innerHTML = head + body;

// ── Footer ───────────────────────────────────────────────────────────────
const now = new Date();
document.getElementById("footer").textContent =
  `Last updated ${now.toLocaleDateString("en-US", {month:"long", day:"numeric", year:"numeric"})} · The Pledge.`;
</script>
</body>
</html>
